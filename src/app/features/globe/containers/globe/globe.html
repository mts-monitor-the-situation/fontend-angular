<div class="relative w-full h-full touch-none select-none">
  <div #globe class="absolute inset-0"></div>

  <div class="absolute left-3 bottom-3 flex space-x-2">
    <button class="control-btn primary" (click)="resetView()">Reset</button>
    <button class="control-btn" (click)="zoomIn()">+</button>
    <button class="control-btn" (click)="zoomOut()">−</button>
  </div>
</div>
