<div class="relative w-full h-full touch-none select-none">
  <div #globe class="absolute inset-0"></div>

  <div class="absolute left-3 bottom-3 space-x-2">
    <button class="px-3 py-1.5 rounded bg-primary text-white" (click)="resetView()">Reset</button>
    <button class="px-3 py-1.5 rounded bg-gray-800 text-white" (click)="zoomIn()">+</button>
    <button class="px-3 py-1.5 rounded bg-gray-800 text-white" (click)="zoomOut()">−</button>
  </div>
</div>
