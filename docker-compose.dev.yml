services:
  web:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -lc "npm ci && npm run start -- --host 0.0.0.0"
    ports:
      - "4200:4200"      # Angular dev server
      - "49153:49153"    # Live reload (Angular/Vite)
    volumes:
      - ./:/workspace
      - /workspace/node_modules
    environment:
      # Keep dev API as in your environment.ts; no runtime templating here.
      - NODE_ENV=development
