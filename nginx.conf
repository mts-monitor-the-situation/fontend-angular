server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Serve static first; fall back to index.html for client-side routes
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets aggressively; tweak in case of frequent deploys
  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }
}
